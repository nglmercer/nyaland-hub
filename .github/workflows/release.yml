name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux-x86_64:
    name: Build (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev xdg-utils

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npx tauri build --target x86_64-unknown-linux-gnu -- --no-default-features
        working-directory: src-tauri

      - name: Collect artifacts
        run: |
          BUNDLE_DIR=src-tauri/target/x86_64-unknown-linux-gnu/release/bundle
          ARTIFACT_DIR=artifacts/linux-x86_64
          mkdir -p "$ARTIFACT_DIR"
          cp -r "$BUNDLE_DIR"/* "$ARTIFACT_DIR/" 2>/dev/null || true
          find "$ARTIFACT_DIR" -type f

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: release-linux-x86_64
          path: artifacts/linux-x86_64/
          if-no-files-found: warn

  build-linux-aarch64:
    name: Build (Linux aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build in arm64 container
        run: |
          docker run --rm --platform linux/arm64 \
            -v "${{ github.workspace }}:/project" \
            -w /project \
            -e CARGO_TERM_COLOR=always \
            arm64v8/ubuntu:noble bash -c "
              export DEBIAN_FRONTEND=noninteractive &&
              apt-get update &&
              apt-get install -y curl build-essential pkg-config \
                libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
                libgtk-3-dev patchelf xdg-utils npm &&
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y &&
              export PATH=\"/root/.cargo/bin:\$PATH\" &&
              rustup target add aarch64-unknown-linux-gnu &&
              cd /project &&
              npm ci &&
              npm run build &&
              cd src-tauri &&
              npx tauri build --target aarch64-unknown-linux-gnu --bundles deb -- --no-default-features
            "

      - name: Collect artifacts
        run: |
          BUNDLE_DIR=src-tauri/target/aarch64-unknown-linux-gnu/release/bundle
          ARTIFACT_DIR=artifacts/linux-aarch64
          mkdir -p "$ARTIFACT_DIR"
          cp -r "$BUNDLE_DIR"/* "$ARTIFACT_DIR/" 2>/dev/null || true
          find "$ARTIFACT_DIR" -type f

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: release-linux-aarch64
          path: artifacts/linux-aarch64/
          if-no-files-found: warn

  build-macos:
    name: Build (macOS ${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            rust_target: aarch64-apple-darwin
          - arch: x86_64
            rust_target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.rust_target }} -- --no-default-features
        working-directory: src-tauri

      - name: Collect artifacts
        run: |
          BUNDLE_DIR=src-tauri/target/${{ matrix.rust_target }}/release/bundle
          ARTIFACT_DIR=artifacts/macos-${{ matrix.arch }}
          mkdir -p "$ARTIFACT_DIR"
          cp -r "$BUNDLE_DIR"/* "$ARTIFACT_DIR/" 2>/dev/null || true
          find "$ARTIFACT_DIR" -type f

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: release-macos-${{ matrix.arch }}
          path: artifacts/macos-${{ matrix.arch }}/
          if-no-files-found: warn

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npx tauri build --target x86_64-pc-windows-msvc -- --no-default-features
        working-directory: src-tauri

      - name: Collect artifacts
        shell: pwsh
        run: |
          $bundleDir = "src-tauri/target/x86_64-pc-windows-msvc/release/bundle"
          $artifactDir = "artifacts/windows-x86_64"
          New-Item -ItemType Directory -Force -Path $artifactDir
          Copy-Item -Path "$bundleDir\*" -Destination $artifactDir -Recurse -Force -ErrorAction SilentlyContinue
          Get-ChildItem -Path $artifactDir -Recurse -File | Select-Object -First 20

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: release-windows-x86_64
          path: artifacts/windows-x86_64/
          if-no-files-found: warn

  publish:
    name: Create GitHub Release
    needs: [build-linux-x86_64, build-linux-aarch64, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/**/*
