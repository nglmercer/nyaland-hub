name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build (Linux ${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            rust_target: x86_64-unknown-linux-gnu
          - arch: aarch64
            rust_target: aarch64-unknown-linux-gnu
            bundle_args: "--bundles deb"
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci

      - name: Install Linux deps (x86_64)
        if: matrix.arch == 'x86_64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev xdg-utils

      - name: Install Linux deps (aarch64)
        if: matrix.arch == 'aarch64'
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libwebkit2gtk-4.1-dev:arm64 libappindicator3-dev:arm64 librsvg2-dev:arm64 libgtk-3-dev:arm64 patchelf xdg-utils
        env:
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.rust_target }} ${{ matrix.bundle_args || '' }} -- --no-default-features
        working-directory: src-tauri

      - name: Collect artifacts
        run: |
          BUNDLE_DIR=src-tauri/target/${{ matrix.rust_target }}/release/bundle
          ARTIFACT_DIR=artifacts/linux-${{ matrix.arch }}
          mkdir -p "$ARTIFACT_DIR"
          cp -r "$BUNDLE_DIR"/* "$ARTIFACT_DIR/" 2>/dev/null || true
          find "$ARTIFACT_DIR" -type f

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: release-linux-${{ matrix.arch }}
          path: artifacts/linux-${{ matrix.arch }}/
          if-no-files-found: warn

  build-macos:
    name: Build (macOS ${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            rust_target: aarch64-apple-darwin
          - arch: x86_64
            rust_target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.rust_target }} -- --no-default-features
        working-directory: src-tauri

      - name: Collect artifacts
        run: |
          BUNDLE_DIR=src-tauri/target/${{ matrix.rust_target }}/release/bundle
          ARTIFACT_DIR=artifacts/macos-${{ matrix.arch }}
          mkdir -p "$ARTIFACT_DIR"
          cp -r "$BUNDLE_DIR"/* "$ARTIFACT_DIR/" 2>/dev/null || true
          find "$ARTIFACT_DIR" -type f

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: release-macos-${{ matrix.arch }}
          path: artifacts/macos-${{ matrix.arch }}/
          if-no-files-found: warn

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npx tauri build --target x86_64-pc-windows-msvc -- --no-default-features
        working-directory: src-tauri

      - name: Collect artifacts
        shell: pwsh
        run: |
          $bundleDir = "src-tauri/target/x86_64-pc-windows-msvc/release/bundle"
          $artifactDir = "artifacts/windows-x86_64"
          New-Item -ItemType Directory -Force -Path $artifactDir
          Copy-Item -Path "$bundleDir\*" -Destination $artifactDir -Recurse -Force -ErrorAction SilentlyContinue
          Get-ChildItem -Path $artifactDir -Recurse -File | Select-Object -First 20

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: release-windows-x86_64
          path: artifacts/windows-x86_64/
          if-no-files-found: warn

  publish:
    name: Create GitHub Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/**/*
